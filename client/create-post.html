<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Post - Mini AI LinkedIn</title>
  <meta name="description" content="Share your thoughts, achievements, and professional updates with the community." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js?v=9"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js?v=9"></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="glass-navbar fixed top-0 left-0 right-0 z-50">
    <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/feed.html" class="text-xl font-bold" style="background: var(--gradient-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
        Mini AI LinkedIn
      </a>
      <div class="flex items-center gap-2">
        <a href="/feed.html" class="nav-link flex items-center gap-2 text-sm font-medium" style="color: var(--text-secondary);">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13h1v7c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-7h1a1 1 0 0 0 .7-1.7l-9-9a1 1 0 0 0-1.4 0l-9 9A1 1 0 0 0 3 13z"/></svg>
          <span class="hidden sm:inline">Home</span>
        </a>
        <a href="/profile.html" class="nav-link flex items-center gap-2 text-sm font-medium" style="color: var(--text-secondary);">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
          <span class="hidden sm:inline">Profile</span>
        </a>
        <a href="/notifications.html" class="nav-link flex items-center gap-2 text-sm font-medium" style="color: var(--text-secondary);">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.1-1.6-5.6-4.5-6.3V4c0-.8-.7-1.5-1.5-1.5s-1.5.7-1.5 1.5v.7C7.6 5.4 6 7.9 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
          <span class="hidden sm:inline">Notifications</span>
        </a>
        <button id="logout-btn" class="nav-link flex items-center gap-2 text-sm font-medium cursor-pointer" style="color: var(--text-secondary); background: none; border: none;">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17 7l-1.4 1.4L18.2 11H8v2h10.2l-2.6 2.6L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
          <span class="hidden sm:inline">Logout</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-2xl mx-auto px-4 pt-24 pb-12">
    <div class="glass-card p-8 animate-fade-in-up">
      <h1 class="text-2xl font-bold mb-2" style="color: var(--text-primary);">Create a Post</h1>
      <p class="text-sm mb-8" style="color: var(--text-secondary);">Share your thoughts, achievements, or learnings with the community.</p>

      <form id="create-post-form">
        <!-- Caption Input -->
        <div class="mb-6">
          <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">
            What's on your mind?
          </label>
          <textarea 
            id="post-caption" 
            class="glass-input w-full resize-none" 
            rows="5" 
            placeholder="Share your thoughts, experiences, or something you learned today..."
            required
            maxlength="3000"
            style="line-height: 1.6;"
          ></textarea>
          <div class="flex items-center justify-between mt-2">
            <span id="char-count" class="text-xs" style="color: var(--text-muted);">0 / 3000</span>
            <button type="button" id="enhance-caption-btn" class="btn-ai text-xs">
              Improve Caption with AI
            </button>
          </div>
        </div>

        <!-- AI Enhanced Caption Preview -->
        <div id="ai-caption-preview" class="hidden mb-6 p-4 rounded-xl" style="background: rgba(108, 92, 231, 0.08); border: 1px solid rgba(108, 92, 231, 0.2);">
          <div class="flex items-center gap-2 mb-3">
            <span class="text-sm font-semibold" style="color: #a855f7;">✨ AI-Enhanced Caption</span>
          </div>
          <p id="ai-caption-text" class="text-sm mb-4" style="color: var(--text-primary); white-space: pre-wrap;"></p>
          <div class="flex gap-3">
            <button type="button" id="use-ai-caption" class="btn-primary text-xs" style="padding: 8px 16px;">Use This</button>
            <button type="button" id="discard-ai-caption" class="btn-secondary text-xs" style="padding: 8px 16px;">Keep Original</button>
          </div>
        </div>

        <!-- Image Upload -->
        <div class="mb-8">
          <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">
            Add an Image (optional)
          </label>
          <div id="image-upload-area" class="border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition-colors" 
               style="border-color: var(--border-color);"
               onclick="document.getElementById('post-image').click()">
            <div id="upload-placeholder">
              <svg class="mx-auto mb-3" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="color: var(--text-muted);">
                <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0 0 22.5 18.75V5.25A2.25 2.25 0 0 0 20.25 3H3.75A2.25 2.25 0 0 0 1.5 5.25v13.5A2.25 2.25 0 0 0 3.75 21Z"/>
              </svg>
              <p class="text-sm" style="color: var(--text-muted);">Click to upload or drag and drop</p>
              <p class="text-xs mt-1" style="color: var(--text-muted);">PNG, JPG up to 5MB</p>
            </div>
            <div id="image-preview-container" class="hidden">
              <img id="image-preview" class="max-h-64 mx-auto rounded-lg" />
              <button type="button" id="remove-image" class="btn-secondary text-xs mt-4" onclick="event.stopPropagation(); removeImage();">
                Remove Image
              </button>
            </div>
          </div>
          <input type="file" id="post-image" accept="image/*" class="hidden" />
        </div>

        <!-- Submit Button -->
        <div class="flex gap-3">
          <button type="submit" id="submit-post-btn" class="btn-primary flex-1">
            Publish Post
          </button>
          <a href="/feed.html" class="btn-secondary flex items-center justify-center" style="text-decoration: none;">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </main>

  <script src="/js/api.js?v=9"></script>
  <script src="/js/auth.js?v=9"></script>
  <script src="/js/createPost.js?v=9"></script>
</body>
</html>
