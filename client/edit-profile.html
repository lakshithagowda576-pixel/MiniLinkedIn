<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile - Mini AI LinkedIn</title>
  <meta name="description" content="Update your professional profile, bio, skills, and profile picture." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js?v=9"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js?v=9"></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="glass-navbar fixed top-0 left-0 right-0 z-50">
    <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/feed.html" class="text-xl font-bold" style="background: var(--gradient-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
        Mini AI LinkedIn
      </a>
      <div class="flex items-center gap-2">
        <a href="/feed.html" class="nav-link flex items-center gap-2 text-sm font-medium" style="color: var(--text-secondary);">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13h1v7c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-7h1a1 1 0 0 0 .7-1.7l-9-9a1 1 0 0 0-1.4 0l-9 9A1 1 0 0 0 3 13z"/></svg>
          <span class="hidden sm:inline">Home</span>
        </a>
        <a href="/profile.html" class="nav-link flex items-center gap-2 text-sm font-medium" style="color: var(--text-secondary);">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
          <span class="hidden sm:inline">Profile</span>
        </a>
        <button id="logout-btn" class="nav-link flex items-center gap-2 text-sm font-medium cursor-pointer" style="color: var(--text-secondary); background: none; border: none;">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17 7l-1.4 1.4L18.2 11H8v2h10.2l-2.6 2.6L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
          <span class="hidden sm:inline">Logout</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-2xl mx-auto px-4 pt-24 pb-12">
    <div class="glass-card p-8 animate-fade-in-up">
      <h1 class="text-2xl font-bold mb-2" style="color: var(--text-primary);">Edit Your Profile</h1>
      <p class="text-sm mb-8" style="color: var(--text-secondary);">Make your profile stand out to potential connections.</p>

      <form id="edit-profile-form">
        <!-- Profile Picture -->
        <div class="mb-8">
          <label class="block text-sm font-medium mb-3" style="color: var(--text-secondary);">
            Profile Picture
          </label>
          <div class="flex items-center gap-6">
            <div class="relative">
              <img id="edit-avatar-preview" src="" alt="Profile picture" class="profile-avatar-large cursor-pointer" style="width: 100px; height: 100px;" onclick="document.getElementById('edit-avatar-input').click()" />
              <div class="absolute bottom-0 right-0 w-8 h-8 rounded-full flex items-center justify-center cursor-pointer" 
                   style="background: var(--primary); border: 2px solid var(--bg-dark);"
                   onclick="document.getElementById('edit-avatar-input').click()">
                <svg width="14" height="14" fill="white" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
              </div>
            </div>
            <div>
              <p class="text-sm" style="color: var(--text-muted);">Click the avatar to change</p>
              <p class="text-xs mt-1" style="color: var(--text-muted);">JPG, PNG up to 5MB</p>
            </div>
          </div>
          <input type="file" id="edit-avatar-input" accept="image/*" class="hidden" />
        </div>

        <!-- Name -->
        <div class="mb-6">
          <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">
            Full Name
          </label>
          <input type="text" id="edit-name" class="glass-input w-full" placeholder="Your full name" required maxlength="100" />
        </div>

        <!-- Bio -->
        <div class="mb-6">
          <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">
            Professional Bio
          </label>
          <textarea id="edit-bio" class="glass-input w-full resize-none" rows="4" placeholder="Tell people about yourself, your experience, and what you're passionate about..." maxlength="500"></textarea>
          <div class="flex items-center justify-between mt-2">
            <span id="bio-char-count" class="text-xs" style="color: var(--text-muted);">0 / 500</span>
            <button type="button" id="enhance-bio-btn" class="btn-ai text-xs">
              Enhance with AI
            </button>
          </div>
        </div>

        <!-- AI Enhanced Bio Preview -->
        <div id="ai-bio-preview" class="hidden mb-6 p-4 rounded-xl" style="background: rgba(108, 92, 231, 0.08); border: 1px solid rgba(108, 92, 231, 0.2);">
          <div class="flex items-center gap-2 mb-3">
            <span class="text-sm font-semibold" style="color: #a855f7;">✨ AI-Enhanced Bio</span>
          </div>
          <p id="ai-bio-text" class="text-sm mb-4" style="color: var(--text-primary); white-space: pre-wrap;"></p>
          <div class="flex gap-3">
            <button type="button" id="use-ai-bio" class="btn-primary text-xs" style="padding: 8px 16px;">Use This</button>
            <button type="button" id="discard-ai-bio" class="btn-secondary text-xs" style="padding: 8px 16px;">Keep Original</button>
          </div>
        </div>

        <!-- Skills -->
        <div class="mb-8">
          <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">
            Skills
          </label>
          <input type="text" id="edit-skills" class="glass-input w-full" placeholder="e.g. JavaScript, React, Python, Machine Learning" />
          <p class="text-xs mt-2" style="color: var(--text-muted);">Separate skills with commas</p>
          
          <!-- Skills Preview -->
          <div id="skills-preview" class="flex flex-wrap gap-2 mt-3"></div>
        </div>

        <!-- Submit -->
        <div class="flex gap-3">
          <button type="submit" id="save-profile-btn" class="btn-primary flex-1">
            Save Changes
          </button>
          <a href="/profile.html" class="btn-secondary flex items-center justify-center" style="text-decoration: none;">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </main>

  <script src="/js/api.js?v=9"></script>
  <script src="/js/auth.js?v=9"></script>
  <script src="/js/editProfile.js?v=9"></script>
</body>
</html>
